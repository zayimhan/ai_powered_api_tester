<nav class="navbar">
  <div class="navbar-brand">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="6" height="6" rx="1.5" fill="#2f81f7" />
      <rect x="11" y="1" width="6" height="6" rx="1.5" fill="#2f81f7" opacity=".5" />
      <rect x="1" y="11" width="6" height="6" rx="1.5" fill="#2f81f7" opacity=".5" />
      <rect x="11" y="11" width="6" height="6" rx="1.5" fill="#2f81f7" opacity=".3" />
    </svg>
    <span class="navbar-logo-text">APIFlow</span>
  </div>

  <div class="navbar-links" *ngIf="authService.isLoggedIn">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
      </svg>
      Home
    </a>
    <a routerLink="/builder" routerLinkActive="active" class="nav-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 18 22 12 16 6" />
        <polyline points="8 6 2 12 8 18" />
      </svg>
      Request Builder
    </a>
    <a routerLink="/collections" routerLinkActive="active" class="nav-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" />
      </svg>
      Collections
    </a>
    <a routerLink="/scenario-runner" routerLinkActive="active" class="nav-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
      </svg>
      Scenario Runner
    </a>
  </div>

  <div class="navbar-end">
    <ng-container *ngIf="authService.isLoggedIn; else authLinks">
      <div class="user-info">
        <span class="username">{{ authService.currentUser?.username }}</span>
        <button class="btn-logout" (click)="logout()">Logout</button>
      </div>
    </ng-container>
    <ng-template #authLinks>
      <div class="auth-links">
        <a routerLink="/login" class="nav-link">Login</a>
        <a routerLink="/register" class="nav-link register-link">Register</a>
      </div>
    </ng-template>
    <span class="status-dot status-online" title="Backend connected"></span>
  </div>
</nav>
