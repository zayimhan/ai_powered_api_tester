<div class="request-form">
    <div class="form-main">
        <!-- Custom Method Dropdown -->
        <div class="method-dropdown" [class.open]="dropdownOpen">
            <button class="method-dropdown-toggle" [ngClass]="'method-' + method.toLowerCase()"
                (click)="toggleDropdown()">
                {{method}}
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polyline points="6 9 12 15 18 9" />
                </svg>
            </button>
            <div class="method-dropdown-menu" *ngIf="dropdownOpen">
                <button *ngFor="let m of methods" class="method-dropdown-item"
                    [ngClass]="'method-' + m.toLowerCase()" [class.selected]="method === m"
                    (click)="selectMethod(m)">
                    {{m}}
                </button>
            </div>
        </div>

        <!-- URL input area with optional baseUrl chip -->
        <div class="url-wrapper">
            <span *ngIf="useBaseUrl" class="base-url-chip">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="2" y1="12" x2="22" y2="12" />
                    <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z" />
                </svg>
                baseUrl
                <button class="chip-remove" (click)="onRemoveBaseUrl()" title="Remove base URL">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </span>
            <input [(ngModel)]="url" class="inp url-input" [class.has-chip]="useBaseUrl"
                [placeholder]="useBaseUrl ? '/api/endpoint' : 'Enter request URL...'"
                (keydown.enter)="onSend()" />
        </div>

        <button (click)="onSend()" class="btn btn-primary send-btn" [disabled]="!url">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
            Send
        </button>
    </div>
    <div class="form-secondary">
        <input [(ngModel)]="title" class="inp title-input" placeholder="Request name (optional)" />
        <button (click)="onSave()" class="btn btn-ghost save-btn" [disabled]="!url" title="Save to collection">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
                <polyline points="17 21 17 13 7 13 7 21" />
                <polyline points="7 3 7 8 15 8" />
            </svg>
            Save
        </button>
    </div>
</div>
