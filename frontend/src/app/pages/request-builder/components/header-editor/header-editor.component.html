<div class="kv-editor">
    <div class="section-label">Headers</div>
    <div class="kv-list">
        <div class="kv-row" *ngFor="let h of headers; let i = index">
            <input [(ngModel)]="h.key" class="inp" placeholder="Key" />
            <input [(ngModel)]="h.value" class="inp" placeholder="Value" />
            <button class="btn btn-danger btn-sm" (click)="removeRow(i)" title="Remove">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
            </button>
        </div>
    </div>
    <button class="btn btn-ghost btn-sm add-btn" (click)="addRow()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Add Header
    </button>
</div>
